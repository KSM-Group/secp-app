<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SECP — Panel QR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1a2235;
  --border: #1e2d45;
  --accent: #1a56db;
  --accent2: #0ea5e9;
  --green: #10b981;
  --red: #ef4444;
  --amber: #f59e0b;
  --purple: #8b5cf6;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #475569;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── BG GRID ── */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: linear-gradient(rgba(26,86,219,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(26,86,219,.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 32px;
  border-bottom: 1px solid var(--border);
  background: rgba(17,24,39,.9);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 10;
}
.header-logo {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-logo-badge {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, #1a56db, #0ea5e9);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; color: #fff;
}
.header-info {
  display: flex;
  align-items: center;
  gap: 20px;
}
.header-clock {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}
.header-date {
  font-size: 13px;
  color: var(--text2);
}
.header-rotate {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 12px;
  color: var(--text2);
}
.rotate-timer {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--accent2);
  font-variant-numeric: tabular-nums;
  min-width: 36px;
}
.cycle-dots {
  display: flex;
  gap: 4px;
}
.cycle-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--border);
  transition: background .3s;
}
.cycle-dot.active { background: var(--accent2); }
.cycle-dot.done { background: var(--text3); }

/* ── QR GRID ── */
.qr-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  padding: 24px 32px;
  max-width: 1000px;
  margin: 0 auto;
}

/* ── QR CARD ── */
.qr-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  transition: transform .2s, box-shadow .2s;
  position: relative;
}
.qr-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(0,0,0,.3);
}
.qr-card-header {
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.qr-card-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.qr-card-title {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}
.qr-card-sub {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}
.qr-card-body {
  display: flex;
  justify-content: center;
  padding: 12px 18px 16px;
}
.qr-wrap {
  background: #fff;
  border-radius: 12px;
  padding: 12px;
  display: inline-flex;
  position: relative;
}
.qr-corner {
  position: absolute;
  width: 16px; height: 16px;
  border-color: inherit;
  border-style: solid;
  border-width: 0;
}
.qr-corner.tl { top: 4px; left: 4px; border-top-width: 3px; border-left-width: 3px; border-top-left-radius: 4px; }
.qr-corner.tr { top: 4px; right: 4px; border-top-width: 3px; border-right-width: 3px; border-top-right-radius: 4px; }
.qr-corner.bl { bottom: 4px; left: 4px; border-bottom-width: 3px; border-left-width: 3px; border-bottom-left-radius: 4px; }
.qr-corner.br { bottom: 4px; right: 4px; border-bottom-width: 3px; border-right-width: 3px; border-bottom-right-radius: 4px; }
.qr-card-footer {
  padding: 10px 18px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.qr-seq {
  font-size: 11px;
  color: var(--text3);
}
.qr-seq span {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  color: var(--text2);
}

/* Card color variants */
.qr-card.entry .qr-card-header { background: rgba(16,185,129,.08); border-bottom: 1px solid rgba(16,185,129,.15); }
.qr-card.entry .qr-card-icon { background: rgba(16,185,129,.15); }
.qr-card.entry .qr-corner { border-color: #10b981; }
.qr-card.entry .qr-seq span { color: #10b981; }

.qr-card.exit .qr-card-header { background: rgba(239,68,68,.08); border-bottom: 1px solid rgba(239,68,68,.15); }
.qr-card.exit .qr-card-icon { background: rgba(239,68,68,.15); }
.qr-card.exit .qr-corner { border-color: #ef4444; }
.qr-card.exit .qr-seq span { color: #ef4444; }

.qr-card.break-start .qr-card-header { background: rgba(245,158,11,.08); border-bottom: 1px solid rgba(245,158,11,.15); }
.qr-card.break-start .qr-card-icon { background: rgba(245,158,11,.15); }
.qr-card.break-start .qr-corner { border-color: #f59e0b; }
.qr-card.break-start .qr-seq span { color: #f59e0b; }

.qr-card.break-end .qr-card-header { background: rgba(139,92,246,.08); border-bottom: 1px solid rgba(139,92,246,.15); }
.qr-card.break-end .qr-card-icon { background: rgba(139,92,246,.15); }
.qr-card.break-end .qr-corner { border-color: #8b5cf6; }
.qr-card.break-end .qr-seq span { color: #8b5cf6; }

/* Progress bar */
.progress-bar-wrap {
  height: 3px;
  background: var(--border);
  position: absolute;
  bottom: 0; left: 0; right: 0;
}
.progress-bar {
  height: 3px;
  transition: width 1s linear;
}
.entry .progress-bar { background: #10b981; }
.exit .progress-bar { background: #ef4444; }
.break-start .progress-bar { background: #f59e0b; }
.break-end .progress-bar { background: #8b5cf6; }

/* ── BOTTOM STATUS ── */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 32px;
  padding: 14px 32px;
  border-top: 1px solid var(--border);
  background: rgba(17,24,39,.8);
  font-size: 12px;
  color: var(--text3);
  position: fixed;
  bottom: 0; left: 0; right: 0;
}
.status-item { display: flex; align-items: center; gap: 6px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;}50%{opacity:.3;} }

/* ── FULLSCREEN BTN ── */
.fs-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 6px 12px;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  font-family: inherit;
  transition: all .2s;
}
.fs-btn:hover { background: var(--border); color: var(--text); }

/* ── REFRESH ANIMATION ── */
.qr-refreshing { opacity: 0; transition: opacity .3s; }
.qr-visible { opacity: 1; transition: opacity .3s; }

/* ── SETTINGS PANEL ── */
.settings-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(4px);
  z-index: 50;
  display: none; align-items: center; justify-content: center;
}
.settings-overlay.open { display: flex; }
.settings-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  width: 360px;
  max-width: 90vw;
}
.settings-panel h2 {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 16px;
}
.form-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.form-row label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
.form-row input, .form-row select {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 12px; font-size: 13px;
  color: var(--text); font-family: inherit; outline: none;
}
.form-row input:focus, .form-row select:focus { border-color: var(--accent); }
.settings-btns { display: flex; gap: 10px; margin-top: 16px; }
.btn-save {
  flex: 1; background: linear-gradient(135deg,#1a56db,#0ea5e9);
  color: #fff; border: none; border-radius: 8px; padding: 10px;
  font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
}
.btn-cancel {
  background: var(--surface2); color: var(--text2); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 16px; font-size: 13px; cursor: pointer; font-family: inherit;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">
    <div class="header-logo-badge">S</div>
    SECP
  </div>
  <div class="header-info">
    <div>
      <div class="header-clock" id="clock">00:00:00</div>
      <div class="header-date" id="date-display">—</div>
    </div>
    <div class="header-rotate">
      <span>Zmiana kodu:</span>
      <span class="rotate-timer" id="rotate-timer">15:00</span>
      
    </div>
    <button class="fs-btn" onclick="toggleFullscreen()">⛶ Pełny ekran</button>
    <button class="fs-btn" onclick="openSettings()">⚙️</button>
  </div>
</div>

<!-- QR GRID -->
<div class="qr-grid">
  <!-- ENTRY -->
  <div class="qr-card entry" id="card-entry">
    <div class="qr-card-header">
      <div class="qr-card-icon">🟢</div>
      <div>
        <div class="qr-card-title">WEJŚCIE</div>
        <div class="qr-card-sub">Początek pracy / Powrót z przerwy</div>
      </div>
    </div>
    <div class="qr-card-body">
      <div class="qr-wrap" id="qr-wrap-entry">
        <div id="qr-entry"></div>
        <div class="qr-corner tl"></div>
        <div class="qr-corner tr"></div>
        <div class="qr-corner bl"></div>
        <div class="qr-corner br"></div>
      </div>
    </div>
    <div class="qr-card-footer">
      <div class="qr-seq"></div>
      
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="pb-entry"></div></div>
  </div>

  <!-- EXIT -->
  <div class="qr-card exit" id="card-exit">
    <div class="qr-card-header">
      <div class="qr-card-icon">🔴</div>
      <div>
        <div class="qr-card-title">WYJŚCIE</div>
        <div class="qr-card-sub">Koniec pracy / Opuszczenie miejsca</div>
      </div>
    </div>
    <div class="qr-card-body">
      <div class="qr-wrap" id="qr-wrap-exit">
        <div id="qr-exit"></div>
        <div class="qr-corner tl"></div>
        <div class="qr-corner tr"></div>
        <div class="qr-corner bl"></div>
        <div class="qr-corner br"></div>
      </div>
    </div>
    <div class="qr-card-footer">
      <div class="qr-seq"></div>
      
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="pb-exit"></div></div>
  </div>

  <!-- BREAK START -->
  <div class="qr-card break-start" id="card-break-start">
    <div class="qr-card-header">
      <div class="qr-card-icon">🟡</div>
      <div>
        <div class="qr-card-title">START PRZERWY</div>
        <div class="qr-card-sub">Wychodzę na przerwę</div>
      </div>
    </div>
    <div class="qr-card-body">
      <div class="qr-wrap" id="qr-wrap-break-start">
        <div id="qr-break-start"></div>
        <div class="qr-corner tl"></div>
        <div class="qr-corner tr"></div>
        <div class="qr-corner bl"></div>
        <div class="qr-corner br"></div>
      </div>
    </div>
    <div class="qr-card-footer">
      <div class="qr-seq"></div>
      
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="pb-break-start"></div></div>
  </div>

  <!-- BREAK END -->
  <div class="qr-card break-end" id="card-break-end">
    <div class="qr-card-header">
      <div class="qr-card-icon">🟣</div>
      <div>
        <div class="qr-card-title">KONIEC PRZERWY</div>
        <div class="qr-card-sub">Wracam do pracy</div>
      </div>
    </div>
    <div class="qr-card-body">
      <div class="qr-wrap" id="qr-wrap-break-end">
        <div id="qr-break-end"></div>
        <div class="qr-corner tl"></div>
        <div class="qr-corner tr"></div>

</div>

<!-- STATUS BAR -->
<div class="status-bar">
  <div class="status-item"><div class="status-dot"></div> System aktywny</div>
  <div class="status-item" id="status-company">📍 Firma: —</div>
  
  <div class="status-item">🔒 Zabezpieczenie: HMAC</div>
</div>

<!-- SETTINGS -->
<div class="settings-overlay" id="settings-overlay" onclick="closeSettingsOutside(event)">
  <div class="settings-panel">
    <h2>⚙️ Ustawienia panelu QR</h2>
    <div class="form-row">
      <label>Nazwa firmy</label>
      <input type="text" id="s-name" value="Moja Firma"/>
    </div>
    <div class="form-row">
      <label>Tajny klucz (nie udostępniaj)</label>
      <input type="text" id="s-secret" value="SECP-2026"/>
    </div>
    <div class="form-row">
      <label>Czas zmiany kodu (minuty)</label>
      <select id="s-interval">
        <option value="5">5 minut</option>
        <option value="10">10 minut</option>
        <option value="15" selected>15 minut</option>
        <option value="20">20 minut</option>
        <option value="30">30 minut</option>
      </select>
    </div>
    <div class="form-row">
      <label>Liczba kodów w cyklu</label>
      <select id="s-cycle">
        <option value="10">10 kodów</option>
        <option value="20" selected>20 kodów</option>
        <option value="48">48 kodów</option>
      </select>
    </div>
    <div class="form-row">
      <label>URL aplikacji pracownika</label>
      <input type="text" id="s-empurl" placeholder="https://ksm-group.github.io/secp-employee/"/>
    </div>
    <div class="settings-btns">
      <button class="btn-cancel" onclick="closeSettings()">Anuluj</button>
      <button class="btn-save" onclick="saveSettings()">💾 Zapisz</button>
    </div>
  </div>
</div>

<div style="height:52px"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
let cfg = {
  name: 'Moja Firma',
  secret: 'SECP-2026',
  interval: 15,   // minutes per code
  cycle: 20,      // codes in loop
  empUrl: window.location.origin + window.location.pathname.replace('secp_qr_panel.html','') + 'secp_employee.html'
};

const ACTIONS = ['entry','exit','break-start','break-end'];
const ACTION_NAMES = { entry:'WEJŚCIE', exit:'WYJŚCIE', 'break-start':'START_PRZERWY', 'break-end':'KONIEC_PRZERWY' };

let qrInstances = {};
let currentCycleIndex = 0;
let secondsLeft = 0;
let totalSeconds = 0;

// ── INIT ──────────────────────────────────────────────────────
window.onload = function() {
  loadSettings();
  buildCycleDots();
  startClock();
  initQRs();
  setInterval(tick, 1000);
};

// ── CLOCK ─────────────────────────────────────────────────────
function startClock() {
  function update() {
    let now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('pl-PL');
    document.getElementById('date-display').textContent =
      now.toLocaleDateString('pl-PL', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  }
  update();
  setInterval(update, 1000);
}

// ── QR INIT ───────────────────────────────────────────────────
function initQRs() {
  // Calculate current cycle index based on time
  let now = Math.floor(Date.now() / 1000);
  let intervalSecs = cfg.interval * 60;
  let cyclePos = Math.floor(now / intervalSecs) % cfg.cycle;
  currentCycleIndex = cyclePos;
  totalSeconds = intervalSecs;
  secondsLeft = intervalSecs - (now % intervalSecs);

  generateAllQRs();
  updateCycleDots();
  updateProgressBars();
}

function generateAllQRs() {
  ACTIONS.forEach(action => {
    let el = document.getElementById('qr-' + action);
    el.innerHTML = '';
    if (qrInstances[action]) { try { qrInstances[action].clear(); } catch(e) {} }

    let token = generateToken(action, currentCycleIndex);
    let url = cfg.empUrl + '?action=' + action + '&token=' + token + '&cycle=' + currentCycleIndex;

    qrInstances[action] = new QRCode(el, {
      text: url,
      width: 160,
      height: 160,
      colorDark: '#0e1117',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });

    // seq hidden
    // hash hidden
  });

  document.getElementById('status-company').textContent = '📍 ' + cfg.name;
}

function generateToken(action, cycleIdx) {
  // Simple deterministic token: base64(secret + action + cycleIdx + date)
  let today = new Date().toISOString().slice(0,10);
  let raw = cfg.secret + ':' + action + ':' + cycleIdx + ':' + today;
  return btoa(raw).replace(/[=+/]/g, c => ({'+':'-','/':'_','=':''}[c] || c));
}

// ── TICK ──────────────────────────────────────────────────────
function tick() {
  secondsLeft--;
  if (secondsLeft <= 0) {
    currentCycleIndex = (currentCycleIndex + 1) % cfg.cycle;
    secondsLeft = cfg.interval * 60;
    refreshQRs();
    updateCycleDots();
  }
  updateTimerDisplay();
  updateProgressBars();
}

function refreshQRs() {
  ACTIONS.forEach(action => {
    let wrap = document.getElementById('qr-wrap-' + action);
    wrap.style.opacity = '0';
    setTimeout(() => {
      let el = document.getElementById('qr-' + action);
      el.innerHTML = '';
      if (qrInstances[action]) { try { qrInstances[action].clear(); } catch(e) {} }

      let token = generateToken(action, currentCycleIndex);
      let url = cfg.empUrl + '?action=' + action + '&token=' + token + '&cycle=' + currentCycleIndex;

      qrInstances[action] = new QRCode(el, {
        text: url,
        width: 160,
        height: 160,
        colorDark: '#0e1117',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });

      // seq hidden
      // hash hidden
      wrap.style.opacity = '1';
    }, 300);
  });
}

function updateTimerDisplay() {
  let m = Math.floor(secondsLeft / 60);
  let s = secondsLeft % 60;

}

function updateProgressBars() {
  let pct = ((totalSeconds - secondsLeft) / totalSeconds) * 100;
  ACTIONS.forEach(action => {
    let pb = document.getElementById('pb-' + action);
    if (pb) pb.style.width = pct + '%';
  });
}

// ── CYCLE DOTS ────────────────────────────────────────────────
function buildCycleDots() {
  let container = document.getElementById('cycle-dots');
  container.innerHTML = '';
  // Show only first 10 dots to save space
  let show = Math.min(cfg.cycle, 10);
  for (let i = 0; i < show; i++) {
    let dot = document.createElement('div');
    dot.className = 'cycle-dot';
    dot.id = 'dot-' + i;
    container.appendChild(dot);
  }
}

function updateCycleDots() {
  let show = Math.min(cfg.cycle, 10);
  for (let i = 0; i < show; i++) {
    let dot = document.getElementById('dot-' + i);
    if (!dot) continue;
    if (i < currentCycleIndex % 10) dot.className = 'cycle-dot done';
    else if (i === currentCycleIndex % 10) dot.className = 'cycle-dot active';
    else dot.className = 'cycle-dot';
  }
}

// ── SETTINGS ─────────────────────────────────────────────────
function loadSettings() {
  let saved = localStorage.getItem('secp-qr-panel-cfg');
  if (saved) cfg = Object.assign(cfg, JSON.parse(saved));
  document.getElementById('s-name').value     = cfg.name;
  document.getElementById('s-secret').value   = cfg.secret;
  document.getElementById('s-interval').value = cfg.interval;
  document.getElementById('s-cycle').value    = cfg.cycle;
  document.getElementById('s-empurl').value   = cfg.empUrl;
}

function saveSettings() {
  cfg.name     = document.getElementById('s-name').value;
  cfg.secret   = document.getElementById('s-secret').value;
  cfg.interval = parseInt(document.getElementById('s-interval').value);
  cfg.cycle    = parseInt(document.getElementById('s-cycle').value);
  cfg.empUrl   = document.getElementById('s-empurl').value;
  localStorage.setItem('secp-qr-panel-cfg', JSON.stringify(cfg));
  closeSettings();
  buildCycleDots();
  initQRs();
}

function openSettings() { document.getElementById('settings-overlay').classList.add('open'); }
function closeSettings() { document.getElementById('settings-overlay').classList.remove('open'); }
function closeSettingsOutside(e) { if (e.target === document.getElementById('settings-overlay')) closeSettings(); }

// ── FULLSCREEN ────────────────────────────────────────────────
function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}
</script>
